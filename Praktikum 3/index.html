<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDA Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>PDA Simulator</h1>
            <p>Otomatisasi PDA</p>
        </header>

        <main class="main-content">
            <section class="panel app-panel" id="config-panel">
                <div class="panel-header">
                    <h2>Konfigurasi</h2>
                    <select id="preset-selector" class="sleek-select">
                        <option value="">-- Pilih Preset PDA --</option>
                        <option value="anbn">a^n b^n</option>
                        <option value="parentheses">Tanda Kurung Seimbang</option>
                        <option value="palindrome">Odd Palindrome (wcw^R)</option>
                        <option value="even_palindrome">Even Palindrome (ww^R)</option>
                    </select>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="states">Himpunan State (Q):</label>
                        <input type="text" id="states" placeholder="q0,q1,q2">
                    </div>

                    <div class="form-group">
                        <label for="input-alphabet">Char Input (Σ):</label>
                        <input type="text" id="input-alphabet" placeholder="a,b">
                    </div>

                    <div class="form-group">
                        <label for="stack-alphabet">Char Stack (Γ):</label>
                        <input type="text" id="stack-alphabet" placeholder="Z,A,B">
                    </div>

                    <div class="form-group">
                        <label for="start-state">State Awal (q0):</label>
                        <input type="text" id="start-state" placeholder="q0">
                    </div>

                    <div class="form-group">
                        <label for="start-stack">Simbol Stack Awal (Z0):</label>
                        <input type="text" id="start-stack" placeholder="Z">
                    </div>

                    <div class="form-group">
                        <label for="accept-states">State Penerima (F):</label>
                        <input type="text" id="accept-states" placeholder="q2">
                    </div>

                    <div class="form-group accept-method-group">
                        <label>Metode Penerimaan:</label>
                        <div class="radio-group">
                            <label>
                                <input type="radio" name="accept-method" value="final_state" checked>
                                Final State
                            </label>
                            <label>
                                <input type="radio" name="accept-method" value="empty_stack">
                                Empty Stack
                            </label>
                        </div>
                    </div>
                </div>

                <div class="transitions-section">
                    <h3>Fungsi Transisi (δ)</h3>
                    <p class="hint">
                        Format:
                        <code>State, Input, Pop Stack -> State_Tujuan, Push Stack</code>
                        (gunakan <code>e</code> untuk epsilon)
                    </p>

                    <textarea
                        id="transitions"
                        rows="8"
                        placeholder="q0,a,Z->q0,AZ&#10;q0,a,A->q0,AA&#10;q0,b,A->q1,e&#10;q1,b,A->q1,e&#10;q1,e,Z->q2,Z"
                    ></textarea>

                    <button id="apply-config-btn" class="primary-btn">
                        Terapkan Konfigurasi
                    </button>
                </div>
            </section>

            <section class="panel simulation-panel">
                <div class="app-panel" id="input-section">
                    <h2>Uji String</h2>

                    <div class="input-test-container">
                        <input
                            type="text"
                            id="test-string"
                            placeholder="Masukkan string (misal: aabb)"
                        >

                        <button id="start-sim-btn" class="action-btn">
                            Cek Validasi
                        </button>
                    </div>

                    <div id="sim-status" class="status-badge idle">
                        Menunggu Input
                    </div>
                </div>

                <div class="app-panel visualizer-section" id="visualizer">
                    <div class="viz-header">
                        <h2>Urutan Transisi</h2>

                        <div class="controls" style="display:flex; gap:10px;">
                            <button id="auto-play-btn" class="icon-btn action-btn">
                                ▶ Auto Play
                            </button>

                            <button id="step-prev" class="icon-btn" disabled>
                                &#9664; Prev
                            </button>

                            <button id="step-next" class="icon-btn" disabled>
                                Next &#9654;
                            </button>
                        </div>
                    </div>

                    <div class="viz-display">
                        <div class="tape-container">
                            <div class="tape-label">Input Tape:</div>

                            <div id="input-tape" class="tape"></div>
                        </div>

                        <div class="viz-core">
                            <div class="state-display">
                                <div class="state-label">Current State</div>

                                <div id="current-state" class="state-circle">
                                    q0
                                </div>
                            </div>

                            <div class="stack-display-container">
                                <div class="stack-label">Stack</div>

                                <div id="stack-container" class="stack"></div>
                            </div>

                            <div class="transition-log-container">
                                <h4>Log Transisi</h4>

                                <ul id="transition-log" class="log-list"></ul>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>© Kelompok B02 Otomata 2026</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
